name: Script Runner
run-name: "script | ${{ inputs.script }} | as ${{ inputs.run_as }} | by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script filename (from scripts/ folder, e.g. example.sh)'
        required: true
        type: string
      run_as:
        description: 'OS user to run the script as (e.g. hdfs, oozie, cicd_prd)'
        required: true
        default: 'default'
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate script exists
        run: |
          SCRIPT_PATH="scripts/${{ inputs.script }}"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "ERROR: Script not found: $SCRIPT_PATH"
            echo "Available scripts:"
            ls scripts/*.sh 2>/dev/null || echo "  (no .sh files found)"
            exit 1
          fi
          echo "Script found: $SCRIPT_PATH"

      - name: Print run summary
        run: |
          echo "## Script Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Script | \`${{ inputs.script }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run as | \`${{ inputs.run_as }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  request-approval:
    needs: validate
    runs-on: ubuntu-latest
    environment: cdp-production

    steps:
      - name: Awaiting approval
        run: |
          echo "Approval granted for: ${{ inputs.script }} as ${{ inputs.run_as }}"

  execute:
    needs: request-approval
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.RUNNER_IMAGE }}
      volumes:
        - /etc/hosts:/etc/hosts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for stale approval
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_AGE: 300
        run: |
          RUN_ID=${{ github.run_id }}
          CREATED_AT=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID --jq '.created_at')
          CREATED_TS=$(date -d "$CREATED_AT" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$CREATED_AT" +%s)
          NOW=$(date +%s)
          AGE=$((NOW - CREATED_TS))
          echo "Workflow age: ${AGE}s (max allowed: ${MAX_AGE}s)"
          if [ "$AGE" -gt "$MAX_AGE" ]; then
            echo "ERROR: Approval is stale (${AGE}s old). Re-trigger the workflow."
            exit 1
          fi

      - name: Make script executable
        run: chmod +x "scripts/${{ inputs.script }}"

      - name: Run script
        run: |
          RUN_AS="${{ inputs.run_as }}"
          SCRIPT="scripts/${{ inputs.script }}"
          if [ "$RUN_AS" = "default" ]; then
            echo "Running ${{ inputs.script }} as current runner user"
            bash "$SCRIPT"
          elif id "$RUN_AS" &>/dev/null; then
            echo "Running ${{ inputs.script }} as $RUN_AS"
            sudo -u "$RUN_AS" bash "$SCRIPT"
          else
            echo "WARN: User '$RUN_AS' not found on this runner — running as current user (demo mode)"
            bash "$SCRIPT"
          fi

      - name: Write audit log
        if: always()
        run: |
          AUDIT_LOG_DIR="/shared/cdp-ops-audit"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          AUDIT_FILE="$AUDIT_LOG_DIR/script-runner-$(date -u +%Y-%m).log"
          ENTRY="$TIMESTAMP | ${{ inputs.script }} | ${{ inputs.run_as }} | ${{ github.actor }} | $STATUS | $RUN_URL"

          if [ ! -d "$AUDIT_LOG_DIR" ]; then
            echo "WARN: '$AUDIT_LOG_DIR' not mounted — skipping audit (configure volume on runner)"
            exit 0
          fi

          if [ ! -f "$AUDIT_FILE" ]; then
            echo "# timestamp | script | run_as | actor | status | run_url" > "$AUDIT_FILE"
          fi

          echo "$ENTRY" >> "$AUDIT_FILE"
          echo "Audit written → $AUDIT_FILE"
